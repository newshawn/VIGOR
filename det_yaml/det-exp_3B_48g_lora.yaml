name: 10h_intuitor
description: test
workspace: ALL-IN-ONE
project: Intuitor

max_restarts: 0
# 只需要修改pool和gpu数量
resources:
  resource_pool: amp-48g
  slots_per_trial: 4
  is_single_node: true
  shm_size: 34359738368

bind_mounts:
  - host_path: /mount/HOME/wenxuexiang
    container_path: /home/wenxuexiang
  - host_path: /mount/NAS1/wenxuexiang
    container_path: /run/determined/NAS1
  - host_path: /mount/NAS1/public
    container_path: /run/determined/NAS1/public

environment:
  image: 10.130.130.5:8192/wenxuexiang:ubuntu22-04-cuda12.8-v3

checkpoint_storage:
  type: shared_fs
  host_path: /mount/NAS1/public
  storage_path: checkpoint
  save_experiment_best: 0
  save_trial_best: 1
  save_trial_latest: 1

searcher:
  name: single
  metric: validation_loss
  max_length:
    epochs: 1
  smaller_is_better: true

profiling:
  enabled: true

entrypoint: /home/wenxuexiang/projects/Intuitor/open-r1-intuitor/training_scripts/run_3B_48G_lora.sh